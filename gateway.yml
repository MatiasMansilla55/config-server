spring:
  application:
    name: gateway



  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "http://localhost:3000"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders:
              - Origin
              - X-Requested-With
              - Content-Type
              - Accept
              - Authorization
            allowCredentials: true
            maxAge: 3600

      # ⛔ Sacar TokenRelay si no hay OAuth2 configurado
      # default-filters:
      #   - TokenRelay

      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/users/**
        - id: accounts-service
          uri: lb://accounts-service
          predicates:
            - Path=/accounts/**


management:
  endpoints:
    web:
      exposure:
        include: health,info

  info:
    env:
      enabled: true


info:
  app:
    name: gateway
    description: API gateway
    version: 1.0.0


eureka:
  client:
    serviceUrl:
      defaultZone: http://eureka-server:8761/eureka/


server:
  port: 8085


spring:
  main:
    allow-bean-definition-overriding: true


logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.security: DEBUG

