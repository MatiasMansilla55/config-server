############################
# APP
############################
spring.application.name=api-activity
# spring.profiles.active=dev
server.port=9091
spring.main.allow-bean-definition-overriding=true

############################
# EUREKA
############################
eureka.client.serviceUrl.defaultZone=http://eureka-server:8761/eureka/
eureka.instance.prefer-ip-address=true

############################
# JPA / HIBERNATE
############################
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.event.merge.entity_copy_observer=allow
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.thymeleaf.check-template-location=false

############################
# DATASOURCE (MYSQL)
############################
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://mysql:3306/userregistry?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}

############################
# MANAGEMENT / ACTUATOR
############################
management.endpoints.web.exposure.include=health,info
management.info.env.enabled=true

############################
# JWT
############################
jwt.secret=${JWT_SECRET}

############################
# FEIGN
############################
spring.cloud.openfeign.discovery.enabled=true

############################
# INFO
############################
info.app.name=api-activity
info.app.description=microservicio de actividad desde github
info.app.version=1.0.0


